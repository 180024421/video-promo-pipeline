services:
  pipeline-gpu:
    build: .
    ports:
      - "8766:8766"
    volumes:
      - ./output:/app/output
      - ./watch_in:/app/watch_in
      - ./config.yaml:/app/config.yaml
    environment:
      - WHISPER_DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
