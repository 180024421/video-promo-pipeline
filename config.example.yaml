# 复制为 config.yaml 后按需修改

# ──────────────────────────────────────────────
# 语音转写 (Whisper)
# ──────────────────────────────────────────────
whisper:
  model: small           # 4060Ti 8G 建议 small；质量优先用 medium / large-v2
  device: cuda           # cuda | cpu
  compute_type: float16  # float16 | float32 | int8
  language: zh           # zh | en | ja 等
  beam_size: 5           # 解码束宽（越大越准越慢）
  vad_filter: true       # 语音活动检测过滤
  initial_prompt: ""     # 可选前缀提示，如 "这是一段技术讲解视频"
  chunk_minutes: 15      # 长视频分块转写，每块分钟数
  chunk_if_longer_sec: 1800  # 超过 30 分钟启用分块
  clear_gpu_cache: true      # 转写后释放 GPU 缓存

# ──────────────────────────────────────────────
# 粗剪去静音 (auto-editor)
# ──────────────────────────────────────────────
auto_editor:
  enabled: true
  silent_threshold: 0.04
  min_silence_duration: 0.35
  margin: 0.2            # 剪切前后留白秒数
  video_codec: "libx264" # 视频编码器
  audio_codec: "aac"     # 音频编码器

# ──────────────────────────────────────────────
# FFmpeg 路径
# ──────────────────────────────────────────────
ffmpeg:
  path: ""               # 留空自动从 PATH 查找；可填绝对路径如 "C:/ffmpeg/bin/ffmpeg.exe"

# ──────────────────────────────────────────────
# 字幕样式与后处理
# ──────────────────────────────────────────────
subtitle:
  font_size: 22
  margin_v: 28
  font_name: Microsoft YaHei
  max_chars_per_line: 18        # 单行最大字符数
  merge_min_duration: 1.2       # 短于该秒数的句段合并
  remove_fillers: true          # 去除“嗯、啊、那个”
  filler_words: ["嗯", "啊", "呃", "那个", "就是", "这个"]
  export_ass: true              # 导出 ASS 字幕
  export_vtt: true              # 导出 WebVTT
  export_pdf: false             # 导出文本为 PDF（需安装 reportlab）
  highlight_keywords: true      # 关键术语高亮
  keyword_highlight_color: "#FFD700"  # 高亮颜色（ASS 用）
  line_spacing: 1.4             # 行间距倍数

# ──────────────────────────────────────────────
# 专业术语纠错
# ──────────────────────────────────────────────
terminology:
  enabled: true
  file: terminology.yaml         # 自定义替换表
  auto_extract: false            # 是否自动从 transcript 提取潜在缩写词
  case_sensitive: false          # 大小写敏感

# ──────────────────────────────────────────────
# 竖屏切片（短视频/小红书）
# ──────────────────────────────────────────────
clip_short:
  enabled: true
  duration_sec: 75
  multi_clip_count: 1          # AI 选段时生成多个竖屏（1-5）
  crop_mode: center            # center | upper | face（需 opencv）
  width: 1080
  height: 1920
  position: start              # start | middle | end | chapter_first | random | smart（AI 选最佳）
  smart_select:                # AI 选取高光片段
    enabled: false
    min_clip_duration: 30
    max_clip_duration: 120
  watermark:                   # 水印设置
    enabled: false
    text: "@你的账号"
    position: "bottom-right"   # top-left | top-right | bottom-left | bottom-right
    opacity: 0.6
  bgm:                         # 背景音乐（可选）
    enabled: false
    file: ""                   # 音频文件路径
    volume: 0.15               # 背景音量 0~1
    ducking: true              # 人声出现时压低 BGM
  caption_style:               # 大字幕/花字
    enabled: false
    font_size: 56
    color: "#FFFFFF"
    stroke_color: "#000000"
    stroke_width: 4

# ──────────────────────────────────────────────
# 封面图生成
# ──────────────────────────────────────────────
cover:
  enabled: true
  width: 1280
  height: 720
  bg_color: "#1a1a2e"
  text_color: "#eaeaea"
  accent_color: "#4cc9f0"
  font_size_title: 56
  font_size_subtitle: 28
  use_video_frame: true        # 从视频截取帧作为封面底图
  frame_position_ratio: 0.12   # 截取位置（视频时长比例）
  custom_template_path: ""      # 自定义模板图片路径
  overlay_icon: false           # 叠加技术图标（如 Java 咖啡杯）
  gradient_bg: true             # 渐变色背景
  gradient_from: "#1a1a2e"
  gradient_to: "#16213e"
  add_qr_code: false            # 添加二维码（需 qrcode 库）
  qr_code_content: ""           # 二维码内容
  ab_enabled: false             # 封面 A/B 多版本

# ──────────────────────────────────────────────
# 智能剪辑（LM Studio 规划高光片段，参考 ToonFlow / NarratoAI）
# ──────────────────────────────────────────────
smart_cut:
  enabled: false
  target_duration_sec: 90       # 目标成片时长
  min_clip_sec: 3
  style: "保留高潮、干货与结论，删除重复与长时间静音"

# ──────────────────────────────────────────────
# AI 配音解说（LM Studio 写稿 + Edge-TTS 合成）
# ──────────────────────────────────────────────
narration:
  enabled: false                 # 开启后：LM 生成解说稿 → TTS 配音
  mode: commentary               # commentary | read_aloud | summarize
  style: "专业解说，口语化，节奏紧凑"
  persona: "科技区 UP 主"
  max_segment_chars: 80
  target_duration_sec: 0         # 0=不限制；>0 时让 LM 压缩解说
  use_lm: true                   # false=直接用转写文本配音
  system_prompt: ""

dubbing:
  enabled: true
  engine: edge-tts
  voice: zh-CN-YunxiNeural       # 男声；女声可用 zh-CN-XiaoxiaoNeural
  rate: "+0%"
  volume: "+0%"
  timeline_mode: continuous      # continuous=连续朗读 | segment=按时间轴插入
  audio_mode: replace            # replace | mix | keep_original
  original_volume: 0.15          # mix 模式原声音量
  burn_narration_subtitles: true
  sync_mode: auto              # auto | none | speed_video | pad_audio
  gpt_sovits:
    base_url: http://127.0.0.1:9880
    text_language: zh
    reference_audio: ""
    prompt_text: ""
  azure:
    key: ""
    region: eastasia
    voice: zh-CN-YunxiNeural
  voice_clone:
    enabled: false
    reference_audio: ""          # GPT-SoVITS 参考音频
  ab_voices:                     # AB 双音色对比
    - zh-CN-YunxiNeural
    - zh-CN-XiaoxiaoNeural

# ──────────────────────────────────────────────
# 视觉理解剪辑（Qwen2-VL 等多模态，经 LM Studio）
# ──────────────────────────────────────────────
vision:
  enabled: false
  frame_count: 6
  require_confirmation: false  # true 时 Web 批准后才应用视觉剪辑
  model: ""                      # 留空用 lm_studio.model

diarization:
  enabled: false                 # 说话人标注（启发式或 pyannote）
  speaker_gap_sec: 1.8
  hf_token: ""                   # pyannote 可选 HuggingFace token

# ──────────────────────────────────────────────
# B-roll 素材插入
# ──────────────────────────────────────────────
broll:
  enabled: false
  assets_dir: assets/broll       # 放置 png/jpg，按文件名匹配 asset_hint

# ──────────────────────────────────────────────
# 多语言出海
# ──────────────────────────────────────────────
i18n:
  enabled: false
  target_language: en            # en | ja | ko
  export_video: false            # 导出多语言字幕轨 mkv

# ──────────────────────────────────────────────
# 打包导出
# ──────────────────────────────────────────────
export:
  zip_enabled: true
  zip_include:
    - "*.mp4"
    - "*.srt"
    - "*.txt"
    - "*.md"
    - "*.json"
    - "*.png"

# ──────────────────────────────────────────────
# 一键发布（生成 manifest，对接开放平台）
# ──────────────────────────────────────────────
publish:
  enabled: false
  bilibili:
    enabled: false
    auto_upload: false           # OAuth 自动上传（需 client_id/secret/refresh_token）
    client_id: ""
    client_secret: ""
    refresh_token: ""
    access_key: ""
    secret: ""
  douyin:
    enabled: false
    client_key: ""
    client_secret: ""

# ──────────────────────────────────────────────
# 工作流预设
# ──────────────────────────────────────────────
workflow:
  preset: ""                     # tech_tutorial | short_commentary | game_commentary
  gpu_schedule: true             # Whisper 后释放 GPU 给 LM Studio

# ──────────────────────────────────────────────
# LM Studio / OpenAI 兼容服务器
# ──────────────────────────────────────────────
lm_studio:
  enabled: true
  base_url: http://127.0.0.1:1234/v1
  api_key: lm-studio
  model: ""                     # 留空使用当前加载模型
  temperature: 0.7
  max_tokens: 4096              # 最大输出 token
  timeout: 120                  # 请求超时秒数
  max_retries: 3                # 最大重试次数
  stream: false                 # 是否流式
  json_retry: true              # JSON 解析失败时自动重试
  seed: 42                      # 确定性种子（留空随机）
  top_p: 0.9                    # nucleus sampling
  frequency_penalty: 0.0        # 频率惩罚
  presence_penalty: 0.0         # 存在惩罚
  system_prompt: ""             # 全局系统提示词（覆盖默认）
  fallback_models:              # 备用模型列表（按优先级尝试）
    - ""
  verbose: false                # 打印完整请求/响应

# ──────────────────────────────────────────────
# 推广文案配置（核心增强）
# ──────────────────────────────────────────────
copy:
  enabled: true

  # ━━━━━━━━━━━━━━━━━━━━━━━━ B站 ━━━━━━━━━━━━━━━━━━━━━━━━
  bilibili:
    enabled: true
    persona: "Java 全栈与自动化测试工程师，分享真实项目实践（已脱敏）"
    style: "干货分享 + 项目复盘"
    tone: "专业且接地气，不说教"
    audience: "后端开发、测试工程师、计算机专业学生"
    content_type: "教程+实录"    # 教程 | 实战 | 复盘 | 测评 | 双号
    avg_video_length: "10-30分钟"
    keywords: ["Java", "Spring Boot", "测试自动化", "项目实战"]
    hot_topics_reference: true    # 参考热门话题
    max_title_length: 40          # B站标题最多 80 字，建议 40 以内
    max_description_length: 500   # 简介最大字數
    max_tags: 10
    chapters_enabled: true        # 生成章节时间轴
    timeline_format: "mm:ss"      # 时间轴格式
    emoji_usage: false            # B站少用 emoji
    call_to_action: "三连+关注，持续更新脱敏项目实战"
    pinned_comment: ""            # 置顶评论模板（生成推荐语）
    forbidden_words:
      - "外挂"
      - "搬砖"
      - "挂机赚钱"
      - "破解"
      - "辅助牟利"
    prompt_override: ""           # 完全覆盖平台 prompt（高级）

  # ━━━━━━━━━━━━━━━━━━━━━━━━ 小红书 ━━━━━━━━━━━━━━━━━━━━━━━
  xiaohongshu:
    enabled: true
    persona: "从后端开发转型技术博主的 UP，分享搞钱+技术干货"
    style: "笔记体，像给朋友发消息"
    tone: "亲切、真诚、带点幽默"
    audience: "想搞副业的程序员、转行的职场人、技术小白"
    content_type: "干货笔记"
    keywords: ["程序员副业", "自动化测试", "远程接单"]
    hot_topics_reference: true
    max_title_length: 20          # 小红书标题建议 20 字内
    max_body_length: 1000         # 正文建议 300-1000 字
    max_topics: 10                # 话题标签数
    emoji_usage: true             # 小红书适合 emoji
    emoji_set: ["💻", "🔥", "⚡", "📌", "✅", "🎯", "🚀"]
    numbered_tips: true           # 使用“3个技巧”“5步搞定”等结构
    highlight_boxes: true         # 关键信息用框或表情强调
    call_to_action: "关注我，持续分享程序员搞钱干货"
    include_cover_tip: true       # 生成封面图配图文案建议
    forbidden_words:
      - "外挂"
      - "搬砖"
      - "暴富"
      - "躺赚"
    prompt_override: ""

  # ━━━━━━━━━━━━━━━━━━━━━━━━ 抖音 ━━━━━━━━━━━━━━━━━━━━━━━━
  douyin:
    enabled: false                # 默认关闭，需要时打开
    persona: "技术圈最会整活的程序员"
    style: "短平快，开头抓人"
    tone: "节奏快、信息密度高"
    audience: "25-35岁职场人"
    max_title_length: 25
    max_body_length: 300
    hook_first_3_seconds: true     # 强调前 3 秒钩子
    hash_tags: ["#程序员", "#技术分享"]
    emoji_usage: true
    call_to_action: "点赞关注，下期更精彩"
    prompt_override: ""

  # ━━━━━━━━━━━━━━━━━━━━━━━━ 微信公众号 ━━━━━━━━━━━━━━━━━━━━━
  wechat_mp:
    enabled: false
    persona: "专注于技术分享与项目复盘"
    style: "深度长文，有结构"
    tone: "专业、理性"
    audience: "程序员和技术管理者"
    max_title_length: 30
    max_body_length: 3000
    md_formatting: true           # 生成 Markdown 格式
    include_toc: true             # 生成目录
    include_author_info: true     # 文末作者介绍
    call_to_action: "点击关注，获取更多干货"
    prompt_override: ""

  # ━━━━━━━━━━━━━━━━━━━━━━━━ 通用文案配置 ━━━━━━━━━━━━━━━━━━━
  general:
    # 前 3 秒钩子
    short_hook_enabled: true
    short_hook_style: "痛点反问式"   # 痛点反问式 | 结果前置式 | 悬念式 | 数字式 | 对比式
    short_hook_count: 3              # 生成几个钩子供选

    # 章节摘要
    chapter_summary_enabled: true
    max_chapters: 12                 # 最大章节数
    min_chapter_duration: 30         # 最短章节时长（秒）

    # 热门话题
    hot_topic_reference: true
    hot_topic_source: "auto"         # auto | 自定义列表
    custom_hot_topics: []            # 自定义热门话题列表

    # 一致性检查
    consistency_check: true          # 检查标题与内容是否一致
    deduplicate_titles: true         # 去重相似的标题候选
    title_scoring_enabled: true      # 标题 A/B 评分排序

    # 转写文本处理
    transcript_max_length: 12000     # 送入 LM 的最大字符数
    transcript_truncate_strategy: "head_tail"  # head | tail | head_tail | smarter

    # 输出格式
    export_formats:
      - "json"
      - "markdown"
      - "txt"

    # 全局禁用词（所有平台通用）
    global_forbidden_words:
      - "外挂"
      - "破解"
      - "盗版"
      - "翻墙"
      - "黑产"

# ──────────────────────────────────────────────
# 流水线全局配置
# ──────────────────────────────────────────────
pipeline:
  copy_source_video: false
  resume: true
  keep_temp_files: false
  parallel_steps: false
  error_handling: "continue"
  subtitle_mode: burn      # burn=烧录硬字幕 | soft=软字幕 mp4+srt 打包
  plugins:                 # 插件 hook: after_transcribe | before_copy | after_pack
    after_pack:
      - src.plugins_builtin:log_job_summary

# ──────────────────────────────────────────────
# 批量处理
# ──────────────────────────────────────────────
batch:
  watch_dir: watch_in
  poll_interval_sec: 30
  preset: ""               # 批量监控默认预设，可被 --preset 覆盖
  file_patterns: ["*.mp4", "*.mkv", "*.mov", "*.webm"]
  skip_existing: true         # 跳过已处理的文件
  parallel_jobs: 1            # 同时处理任务数（建议 1，避免 GPU 争抢）

# ──────────────────────────────────────────────
# Web 面板
# ──────────────────────────────────────────────
web:
  host: 127.0.0.1
  port: 8766
  max_upload_size: 2147483648  # 2GB
  max_concurrent_jobs: 1       # GPU 并发任务数
  auth_token: ""                 # 非空时 API 需 X-Auth-Token 头
  enable_upload: true
  enable_delete: true          # 允许 Web 删除任务
  enable_preview: true         # 允许视频预览
  theme: "dark"                # dark | light

# ──────────────────────────────────────────────
# 日志与输出
# ──────────────────────────────────────────────
logging:
  level: "INFO"               # DEBUG | INFO | WARNING | ERROR
  file: "logs/pipeline.log"   # 留空不写入文件
  format: "%(asctime)s [%(levelname)s] %(message)s"
  max_bytes: 10485760         # 10MB
  backup_count: 5

output:
  dir: output
  naming_template: "{stem}_{timestamp}"   # 输出目录命名模板
  organize_by_date: false                # 按日期分子目录

# ──────────────────────────────────────────────
# v3.4 成片质量 / 热点 / 片头片尾 / 敏感词
# ──────────────────────────────────────────────
video_quality:
  preset: balanced           # fast | balanced | quality
  crf: 23                    # 覆盖预设 CRF
  ffmpeg_preset: medium        # x264 preset
  audio_bitrate: 128k

whisperx:
  enabled: false             # 字级对齐（pip install whisperx）
  model: small
  device: cuda

hot_topics:
  enabled: false
  platform: bilibili
  custom: []
  max_inject: 3

intro_outro:
  enabled: false
  intro: assets/intro.mp4
  outro: assets/outro.mp4

sensitive_scan:
  enabled: true
  extra_words: []
